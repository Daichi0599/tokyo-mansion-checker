<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px;
    height: 1006px;
    overflow: hidden;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 45%, #1d4ed8 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* 背景グリッド装飾 */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.08) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* 光の丸 */
  .glow {
    position: absolute;
    width: 800px;
    height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .badge {
    background: rgba(59,130,246,0.25);
    border: 1px solid rgba(96,165,250,0.5);
    border-radius: 999px;
    padding: 10px 32px;
    font-size: 22px;
    color: rgba(147,197,253,1);
    letter-spacing: 0.05em;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .logo {
    background: white;
    border-radius: 20px;
    padding: 14px 40px;
    font-size: 64px;
    font-weight: 900;
    color: #1d4ed8;
    letter-spacing: -0.02em;
  }

  .tagline {
    font-size: 28px;
    color: rgba(255,255,255,0.55);
  }

  .title {
    font-size: 72px;
    font-weight: 900;
    color: white;
    letter-spacing: -0.02em;
    text-align: center;
  }

  .tools {
    display: flex;
    gap: 20px;
    margin-top: 8px;
  }

  .tool {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 20px 36px;
    min-width: 220px;
  }

  .tool-icon { font-size: 40px; }
  .tool-label { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.9); }

  .url {
    position: absolute;
    bottom: 48px;
    right: 80px;
    font-size: 24px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>

  <div class="content">
    <div class="badge">30代のお金の一歩目に</div>

    <div class="logo-row">
      <div class="logo">30Lab</div>
      <div class="tagline">サンラボ</div>
    </div>

    <div class="title">気になったら、まずここから。</div>

    <div class="tools">
      <div class="tool">
        <div class="tool-icon">🏠</div>
        <div class="tool-label">マンション購入診断</div>
      </div>
      <div class="tool">
        <div class="tool-icon">🔍</div>
        <div class="tool-label">物件診断</div>
      </div>
      <div class="tool">
        <div class="tool-icon">🚗</div>
        <div class="tool-label">車コスト診断</div>
      </div>
      <div class="tool">
        <div class="tool-icon">👶</div>
        <div class="tool-label">子育て費用試算</div>
      </div>
    </div>
  </div>

  <div class="url">note.com/30lab</div>
</body>
</html>
